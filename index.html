<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Manager - Your work, tracked</title>
<style>
  :root {
    --bg-light: #F9FAF9;
    --text-main: #111827;
    --text-subtle: #6B7280;
    --border-main: #E5E7EB;
    --card-bg: white;
    --green-light: #EEF7EE; --green-text: #21612F;
    --amber-light: #FFF8E6; --amber-text: #A7620C;
    --purple-light: #F3E8FF; --purple-text: #6B21A8;
    --grey-light: #F3F4F6; --grey-text: #4B5563;
    --red-light: #FEF2F2; --red-text: #991B1B;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    margin: 0; padding: 0;
    background-color: var(--bg-light); color: var(--text-main);
    overflow-x: hidden;
  }
  
  /* Header */
  .header {
    width: calc(100% - 250px); margin-left: 250px;
    background-color: var(--card-bg); border-bottom: 1px solid var(--border-main);
    padding: 15px 30px; box-sizing: border-box;
    display: flex; justify-content: space-between; align-items: center;
    position: fixed; top: 0; left: 0; z-index: 100;
  }
  .header-logo { font-size: 1.25rem; font-weight: 700; }
  .header-tagline { font-size: 0.875rem; color: var(--text-subtle); margin-left: 10px; border-left: 1px solid var(--border-main); padding-left: 10px; }
  .header-actions { display: flex; gap: 15px; }
  .btn { padding: 8px 16px; border-radius: 6px; font-size: 0.875rem; cursor: pointer; border: none; font-weight: 500; }
  .btn-export { background-color: transparent; color: var(--text-main); border: 1px solid var(--border-main); }
  .btn-export:hover { background-color: var(--bg-light); }
  .btn-new-project { background-color: #111827; color: white; }
  .btn-new-project:hover { background-color: #374151; }

  /* Sidebar */
  .sidebar {
    width: 250px; background-color: var(--card-bg); border-right: 1px solid var(--border-main);
    padding: 30px; box-sizing: border-box;
    position: fixed; height: 100vh; left: 0; top: 0; z-index: 101;
  }
  .sidebar-section { margin-bottom: 40px; }
  .sidebar-header { text-transform: uppercase; font-size: 0.75rem; font-weight: 600; color: var(--text-subtle); margin-bottom: 15px; }
  .sidebar-link {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; border-radius: 6px; cursor: pointer;
    color: var(--text-main); font-size: 0.875rem; text-decoration: none;
  }
  .sidebar-link:hover, .sidebar-link.active { background-color: var(--bg-light); }
  .sidebar-link.active { font-weight: 600; }
  .link-icon-text { display: flex; align-items: center; gap: 10px; }
  .sidebar-link-icon { width: 18px; opacity: 0.7; display: flex; justify-content: center; }
  .sidebar-count { font-size: 0.75rem; color: var(--text-subtle); background-color: var(--bg-light); border: 1px solid var(--border-main); padding: 2px 8px; border-radius: 999px; }

  /* Main Content */
  .main-content { margin-left: 250px; padding: 100px 30px 40px; box-sizing: border-box; transition: margin-right 0.3s; }
  .main-title { font-size: 1.75rem; font-weight: 700; margin: 0 0 5px 0; }
  .main-subtitle { color: var(--text-subtle); font-size: 0.875rem; margin-bottom: 30px; }

  /* Stats Grid */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
